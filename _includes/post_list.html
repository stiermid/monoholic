<ul class="post-list">
  {%- for post in site.posts -%}
    <li>
      <span class="post-meta">
        * {{ post.date | date: site.theme_config.date_format }}
      </span>
      <a class="post-link" href="{{ post.url | relative_url }}">
        {{ post.title | escape }}
      </a>
    </li>
  {%- endfor -%}
</ul>
